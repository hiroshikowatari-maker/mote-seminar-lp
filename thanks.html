<style>
:root {
  --navy: #0a1f44;
  --navy-deep: #050f24;
  --blue: #1e5bb8;
  --blue-light: #3b82f6;
  --white: #ffffff;
  --gold: #c8a45c;
  --gold-light: #e3c989;
  --serif: "Shippori Mincho", "游明朝", serif;
  --sans: "Zen Kaku Gothic New", "游ゴシック", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--sans);
  background: linear-gradient(180deg, var(--navy-deep) 0%, var(--navy) 70%, var(--blue) 100%);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 640px;
  width: 100%;
  text-align: center;
  animation: fadeUp 1s ease-out;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to { opacity: 1; transform: translateY(0); }
}

.badge {
  display: inline-block;
  font-size: 0.78rem;
  letter-spacing: 0.4em;
  color: var(--gold-light);
  margin-bottom: 40px;
  padding: 8px 24px;
  border: 1px solid rgba(200,164,92,0.4);
  border-radius: 2px;
}

.check-icon {
  width: 80px;
  height: 80px;
  background: rgba(59,130,246,0.15);
  border: 2px solid rgba(59,130,246,0.4);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 40px;
  font-size: 2rem;
}

.title {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 800;
  line-height: 1.4;
  margin-bottom: 24px;
  letter-spacing: 0.05em;
}

.title .accent {
  color: var(--gold-light);
}

.message {
  font-size: 1rem;
  line-height: 2;
  color: rgba(255,255,255,0.85);
  margin-bottom: 48px;
}

.divider {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 40px auto;
}

.info-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(200,164,92,0.2);
  border-radius: 8px;
  padding: 32px;
  margin-bottom: 40px;
  text-align: left;
}

.info-box__title {
  font-size: 0.8rem;
  letter-spacing: 0.3em;
  color: var(--gold-light);
  margin-bottom: 20px;
}

.info-box__item {
  display: flex;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  font-size: 0.95rem;
  line-height: 1.6;
}

.info-box__item:last-child {
  border-bottom: none;
}

.info-box__label {
  color: var(--gold-light);
  min-width: 80px;
  font-size: 0.85rem;
}

.note {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.55);
  line-height: 1.8;
}
</style>
</head>
<body>

<div class="container">
  <div class="badge">SEMINAR REGISTRATION COMPLETE</div>

  <div class="check-icon">✓</div>

  <h1 class="title">
    お申し込みが<br>
    <span class="accent">完了しました。</span>
  </h1>

  <p class="message">
    セミナーへのお申し込み、ありがとうございます。<br>
    ご登録いただいたメールアドレスへ<br>
    確認メールをお送りしました。<br>
    当日、会場でお会いできることを<br>
    楽しみにしています。
  </p>

  <div class="divider"></div>

  <div class="info-box">
    <p class="info-box__title">SEMINAR INFO</p>
    <div class="info-box__item">
      <span class="info-box__label">セミナー名</span>
      <span>告白する側から、告白される側へ。<br>モテで人生激変セミナー</span>
    </div>
    <div class="info-box__item">
      <span class="info-box__label">参加費</span>
      <span>無料</span>
    </div>
    <div class="info-box__item">
      <span class="info-box__label">場所</span>
      <span>名古屋駅徒歩5分（詳細はメールにてご案内）</span>
    </div>
  </div>

  <p class="note">
    ※ 確認メールが届かない場合は、迷惑メールフォルダをご確認ください。<br>
    ※ ご不明な点はお気軽にお問い合わせください。
  </p>
</div>

</body>
